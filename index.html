
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>모모트레이스</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet"/>
<style>
:root{--p:#378ADD;--pd:#0C447C;--pl:#E6F1FB;--a:#FFB84A;--ad:#BA7517;--al:#FAEEDA;--s:#F2F5FA;--w:#fff;--dot:rgba(55,138,221,.10);--t1:#1A2332;--t2:#5A6878;--t3:#8A95A5;--b:#DDE4ED;--r:#E5484D}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:'Pretendard',-apple-system,sans-serif;color:var(--t1);background:#fff;overflow:hidden;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea{font-family:inherit}
#app{position:fixed;inset:0;overflow:hidden}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;background:#fff;transform:translateX(100%);transition:transform .32s cubic-bezier(.32,.72,.32,1)}
.screen.active{transform:translateX(0)}
.screen.prev{transform:translateX(-26px);opacity:.5}
.board-bg{background-color:#fff;background-image:radial-gradient(circle,var(--dot) 1.1px,transparent 1.1px);background-size:24px 24px}

/* STATUS BAR */
.sb{display:flex;align-items:center;justify-content:space-between;padding:14px 28px 0;height:54px;flex-shrink:0}
.sb-time{font-size:15px;font-weight:600}
.sb-icons{display:flex;align-items:center;gap:5px}

/* TOP BAR */
.topbar{display:flex;align-items:center;height:52px;padding:0 10px 0 14px;flex-shrink:0;justify-content:space-between}
.topbar.dark{background:#1a2025}
.tb-l{display:flex;align-items:center}
.tb-r{display:flex;align-items:center;justify-content:flex-end;gap:2px}
.tb-title{flex:1;text-align:center;font-size:16px;font-weight:700;letter-spacing:-.02em}
.ibtn{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:50%}
.ibtn:active{background:rgba(0,0,0,.06)}
.txt-btn{font-size:15px;font-weight:600;color:var(--t3);padding:6px 4px}
.txt-btn.on{color:var(--p)}
.txt-btn.cancel{color:var(--t2)}
.row-gap{display:flex;align-items:center;gap:4px}

/* CHIP */
.chip{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:600;padding:5px 10px 5px 8px;border-radius:999px;white-space:nowrap}
.chip-p{background:var(--pl);color:var(--pd)}
.chip-a{background:var(--al);color:var(--ad)}
.chip-n{background:var(--s);color:var(--t2)}

/* HOME */
.logo-tiny{display:flex;align-items:center;gap:6px;font-size:15px;font-weight:700}
.logo-tiny b{color:var(--p)}
.board-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;padding:0 20px}
.board-ph{text-align:center;font-size:28px;font-weight:800;letter-spacing:-.04em;line-height:1.22;margin-bottom:14px}
.board-cursor{display:inline-block;width:2.5px;height:1.1em;background:var(--p);border-radius:2px;margin-left:2px;vertical-align:text-bottom;animation:blink 1.1s step-end infinite}
@keyframes blink{50%{opacity:0}}
.board-hint{display:flex;align-items:center;gap:4px;font-size:12.5px;color:var(--t3);margin-bottom:32px}
.board-recent{width:100%}
.recent-label{font-size:11.5px;font-weight:700;color:var(--t3);letter-spacing:.04em;margin-bottom:10px}
.recent-strip{display:flex;gap:10px}
.rpill{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--b);border-radius:14px;padding:9px 12px;flex:1;min-width:0;box-shadow:0 2px 8px rgba(12,68,124,.05);cursor:pointer}
.rpill:active{transform:scale(.97)}
.rpill-thumb{width:28px;height:28px;border-radius:9px;background:var(--pl);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.rpill-thumb img{width:100%;height:100%;object-fit:cover}
.rpill-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ACTION BAR */
.action-bar{height:80px;display:flex;align-items:center;justify-content:space-around;padding:0 40px 10px;border-top:1px solid var(--b);background:#fff;flex-shrink:0}
.abtn{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--s)}
.abtn:active{transform:scale(.94)}
.abtn.main{background:linear-gradient(140deg,var(--p),var(--pd));box-shadow:0 8px 20px rgba(55,138,221,.4);width:60px;height:60px}
.abtn.add{background:var(--pl)}

/* WRITE */
.write-body{flex:1;padding:12px 20px 8px;display:flex;flex-direction:column;overflow:hidden}
.write-area{flex:1;font-size:16px;color:var(--t1);resize:none;border:none;outline:none;background:transparent;line-height:1.7}
.ctx-chips{display:flex;flex-wrap:wrap;gap:6px;padding-top:8px}
.chip-note{width:100%;font-size:11px;color:var(--t3);margin-top:2px}

/* KEYBOARD */
.keyboard{background:#d0d4da;padding:8px 3px 10px;flex-shrink:0}
.kb-row{display:flex;justify-content:center;gap:5px;margin-bottom:9px}
.kb-row:last-child{margin-bottom:0}
.kk{min-width:31px;height:42px;border-radius:6px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;color:#000;box-shadow:0 1px 0 #8c9099;flex:1;max-width:36px}
.kk.fn{background:#adb4bc;font-size:18px}
.kk.fn.wide{flex:1.5;font-size:14px}
.kk.space{flex:5;font-size:14px;color:#555}

/* VOICE */
.voice-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:0 24px}
.rec-dot{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:var(--r)}
.rdot{width:10px;height:10px;border-radius:50%;background:var(--r);animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}
.waveform{display:flex;align-items:center;gap:4px;height:60px}
.wbar{width:4px;border-radius:3px;background:var(--p);animation:wave 1.1s ease-in-out infinite alternate}
@keyframes wave{from{height:6px}to{height:var(--h,30px)}}
.voice-time{font-size:36px;font-weight:700;letter-spacing:-.04em;font-variant-numeric:tabular-nums}
.vtranscript{font-size:14px;line-height:1.6;color:var(--t2);text-align:center;max-width:300px;min-height:60px}
.vq{font-size:20px;color:var(--p);font-weight:800}
.vcursor{display:inline-block;width:2px;height:1em;background:var(--p);border-radius:1px;vertical-align:text-bottom;animation:blink .8s step-end infinite}
.vhint{font-size:12px;color:var(--t3);display:flex;align-items:center;gap:5px}
.voice-ctrl{height:100px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.vstop{width:64px;height:64px;border-radius:50%;background:var(--r);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(229,72,77,.4)}
.vstop:active{transform:scale(.93)}
.vstop-sq{width:22px;height:22px;border-radius:5px;background:#fff}

/* CAMERA */
.cam-bg{background:#1a2025}
.cam-stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;gap:14px;overflow:hidden}
.cam-frame{width:100%;flex:1;border-radius:20px;overflow:hidden;position:relative;background:#2a3340;max-height:440px}
.cam-frame img{width:100%;height:100%;object-fit:cover}
.cam-corner{position:absolute;width:22px;height:22px;border-color:#fff;border-style:solid;border-width:0}
.cam-corner.tl{top:14px;left:14px;border-top-width:2.5px;border-left-width:2.5px;border-top-left-radius:4px}
.cam-corner.tr{top:14px;right:14px;border-top-width:2.5px;border-right-width:2.5px;border-top-right-radius:4px}
.cam-corner.bl{bottom:14px;left:14px;border-bottom-width:2.5px;border-left-width:2.5px;border-bottom-left-radius:4px}
.cam-corner.br{bottom:14px;right:14px;border-bottom-width:2.5px;border-right-width:2.5px;border-bottom-right-radius:4px}
.cam-guide{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.6);color:#fff;font-size:12px;font-weight:500;padding:7px 14px;border-radius:999px;white-space:nowrap;backdrop-filter:blur(8px)}
.scan-line{position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--p),transparent);animation:scan 1.4s linear infinite}
@keyframes scan{from{top:0}to{top:100%}}
.scan-tag{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:6px;background:rgba(55,138,221,.9);color:#fff;font-size:12px;font-weight:600;padding:7px 14px;border-radius:999px}
.ocr-box{position:absolute;border:1.5px solid rgba(55,138,221,.8);border-radius:5px;background:rgba(55,138,221,.12);padding:3px 6px}
.ocr-box span{font-size:12px;color:#fff;font-weight:600}
.cam-detected{width:100%;display:flex;gap:8px;justify-content:center}
.cam-ctrl{height:100px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.shutter{width:68px;height:68px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 4px rgba(255,255,255,.3)}
.shutter:active{transform:scale(.93)}
.shutter-in{width:54px;height:54px;border-radius:50%;background:#fff;border:2px solid #ddd}
.cam-proc{color:rgba(255,255,255,.8);font-size:15px;font-weight:600}
.cam-save{display:flex;align-items:center;gap:8px;background:var(--p);color:#fff;font-size:15px;font-weight:600;padding:14px 28px;border-radius:999px;box-shadow:0 8px 20px rgba(55,138,221,.4)}
.cam-save:active{transform:scale(.97)}

/* SURFACE / LIST */
.surface{background:var(--s)}
.list-scroll{flex:1;overflow-y:auto;padding:8px 16px 20px}
.list-hint{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--t3);padding:10px 4px 14px}
.memo-list{display:flex;flex-direction:column;gap:6px}
.memo-card{border-radius:18px;background:#fff;border:1px solid var(--b);overflow:hidden}
.memo-row{display:flex;align-items:center;gap:12px;padding:13px 14px;cursor:pointer}
.memo-row:active{background:var(--s)}
.memo-thumb{width:40px;height:40px;border-radius:12px;background:var(--pl);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.memo-thumb img{width:100%;height:100%;object-fit:cover}
.memo-info{flex:1;min-width:0}
.memo-title{font-size:14.5px;font-weight:600;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.memo-ctx{font-size:12px;color:var(--t2);display:flex;align-items:center;gap:4px}
.sort-tabs{display:flex;gap:4px;padding:10px 16px 2px;flex-shrink:0}
.sort-tab{flex:1;padding:8px 4px;font-size:12.5px;font-weight:600;color:var(--t3);border-radius:10px}
.sort-tab.on{background:var(--pl);color:var(--pd)}
.title-cnt{color:var(--p)}
.mini-btn{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:10px;background:var(--s)}
.empty-state{display:flex;flex-direction:column;align-items:center;gap:10px;padding:60px 20px}
.empty-icon{width:56px;height:56px;border-radius:20px;background:#fff;border:1px solid var(--b);display:flex;align-items:center;justify-content:center}
.empty-text{font-size:14px;color:var(--t3);font-weight:500}

/* RECALL */
.recall-body{flex:1;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:16px}
.recall-search{display:flex;align-items:center;gap:10px;background:#fff;border:1.5px solid var(--b);border-radius:18px;padding:12px 14px}
.recall-search.filled{border-color:var(--p);box-shadow:0 0 0 3px var(--pl)}
.recall-input{flex:1;font-size:15px;border:none;outline:none;background:transparent;color:var(--t1)}
.recall-input::placeholder{color:var(--t3)}
.recall-clear{width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:var(--s)}
.suggest-label{font-size:13px;font-weight:700;color:var(--t2)}
.suggest-chips{display:flex;flex-wrap:wrap;gap:8px}
.suggest-chip{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;color:var(--t2);background:#fff;border:1px solid var(--b);border-radius:999px;padding:8px 14px}
.suggest-chip:active{transform:scale(.96)}
.recall-tip{font-size:12px;color:var(--t3);display:flex;align-items:center;gap:5px}
.recall-go{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;background:var(--p);color:#fff;border-radius:16px;font-size:15px;font-weight:600}
.recall-go:active{transform:scale(.98)}
.recall-status{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:500;color:var(--p);padding:10px 0}
.recall-timer{font-size:13px;color:var(--t3);font-variant-numeric:tabular-nums;margin-left:auto}
.recall-results{display:flex;flex-direction:column;gap:8px}
.recall-empty{font-size:14px;color:var(--t3);text-align:center;padding:24px 0}
.recall-card{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--b);border-radius:18px;padding:13px 14px;cursor:pointer}
.recall-card:active{transform:scale(.98)}
.recall-card.match{border-color:var(--p);box-shadow:0 0 0 3px var(--pl)}
.recall-thumb{width:40px;height:40px;border-radius:12px;background:var(--pl);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.recall-thumb img{width:100%;height:100%;object-fit:cover}
.recall-info{flex:1;min-width:0}
.recall-nm{font-size:14px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.recall-ctx{font-size:12px;color:var(--t2)}
.match-badge{font-size:12px;font-weight:700;color:var(--t3);background:var(--s);padding:4px 8px;border-radius:999px}
.match-badge.top{background:var(--pl);color:var(--pd)}

/* DETAIL */
.detail-scroll{overflow-y:auto}
.detail-hero{width:100%;height:200px;overflow:hidden;position:relative;background:linear-gradient(135deg,#2a3340,#44515f);display:flex;align-items:center;justify-content:center}
.detail-hero img{width:100%;height:100%;object-fit:cover}
.detail-pad{padding:18px 20px 20px}
.type-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.type-pill{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;padding:4px 10px;border-radius:999px;background:var(--s);color:var(--t2)}
.type-pill.photo{background:var(--pl);color:var(--pd)}
.type-pill.voice{background:var(--al);color:var(--ad)}
.detail-time{font-size:12px;color:var(--t3);margin-left:auto}
.detail-title{font-size:22px;font-weight:800;letter-spacing:-.04em;line-height:1.25;margin-bottom:14px}
.detail-voice-bar{display:flex;align-items:center;gap:10px;background:var(--al);border-radius:14px;padding:12px 14px;margin-bottom:14px}
.vplay{width:36px;height:36px;border-radius:50%;background:var(--a);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.vbars{display:flex;align-items:center;gap:2.5px;flex:1;height:28px}
.vbars span{display:block;width:3px;border-radius:2px;background:var(--ad)}
.vdur{font-size:12px;font-weight:600;color:var(--ad);font-variant-numeric:tabular-nums}
.detail-body-text{font-size:15px;line-height:1.65;color:var(--t2);margin-bottom:14px}
.transcript-tag{display:inline-block;font-size:11px;font-weight:700;color:var(--p);background:var(--pl);border-radius:6px;padding:2px 7px;margin-right:6px}
.detail-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.detail-card{background:#fff;border:1px solid var(--b);border-radius:16px;overflow:hidden;margin-bottom:12px}
.detail-card-head{display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:700;color:var(--t2);padding:12px 14px 10px;border-bottom:1px solid var(--b)}
.ocr-head{background:var(--pl);color:var(--pd);border-bottom-color:rgba(55,138,221,.15)}
.ocr-auto{margin-left:auto;font-size:10px;background:var(--p);color:#fff;padding:2px 6px;border-radius:4px;font-weight:700}
.ocr-text{font-family:monospace;font-size:13px;line-height:1.7;color:var(--t1);padding:12px 14px;white-space:pre-wrap}
.map-head{background:#f0f5ff;color:var(--pd);border-bottom-color:rgba(55,138,221,.1)}
.map-mini{height:110px;position:relative;overflow:hidden;background:#e8eef8}
.map-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(55,138,221,.08) 1px,transparent 1px),linear-gradient(90deg,rgba(55,138,221,.08) 1px,transparent 1px);background-size:24px 24px}
.map-road{position:absolute;background:#fff;border-radius:2px}
.map-pin{position:absolute;top:28px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:2px}
.pin-dot{width:12px;height:12px;border-radius:50%;background:var(--p);border:2px solid #fff;box-shadow:0 2px 8px rgba(55,138,221,.5)}
.pin-ring{width:28px;height:28px;border-radius:50%;border:2px solid rgba(55,138,221,.3);animation:pingRing 2s ease-out infinite}
@keyframes pingRing{0%{transform:scale(.5);opacity:.8}100%{transform:scale(1.4);opacity:0}}
.map-label{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);background:var(--p);color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px;white-space:nowrap}
.related-list{display:flex;flex-wrap:wrap;gap:8px;padding-top:8px}
.related-chip{display:flex;align-items:center;gap:7px;background:#fff;border:1px solid var(--b);border-radius:12px;padding:8px 12px;cursor:pointer}
.related-chip:active{transform:scale(.97)}
.related-thumb{width:26px;height:26px;border-radius:8px;background:var(--pl);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.related-thumb img{width:100%;height:100%;object-fit:cover}
.related-chip span{font-size:13px;font-weight:600}
.detail-actions{display:flex;border-top:1px solid var(--b);background:#fff;padding:12px 10px 20px;gap:2px;flex-shrink:0}
.da-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;font-size:11.5px;font-weight:600;color:var(--t2);padding:8px 4px;border-radius:12px}
.da-btn:active{background:var(--s)}
.da-btn.danger{color:var(--r)}

/* DRAWER */
.drawer-layer{position:absolute;inset:0;z-index:300;pointer-events:none}
.drawer-layer.open{pointer-events:auto}
.drawer-scrim{position:absolute;inset:0;background:rgba(0,0,0,.4);opacity:0;transition:opacity .28s;backdrop-filter:blur(2px)}
.drawer-layer.open .drawer-scrim{opacity:1}
.drawer-panel{position:absolute;top:0;right:0;bottom:0;width:80%;max-width:300px;background:#fff;padding:54px 0 20px;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s cubic-bezier(.32,.72,.32,1);box-shadow:-4px 0 30px rgba(0,0,0,.12);border-radius:28px 0 0 28px}
.drawer-layer.open .drawer-panel{transform:translateX(0)}
.drawer-close{position:absolute;top:16px;right:14px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:var(--s)}
.drawer-profile{display:flex;align-items:center;gap:12px;padding:14px 20px 18px;border-bottom:1px solid var(--b);margin-bottom:8px}
.avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--p),var(--pd));display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff;flex-shrink:0}
.dp-name{font-size:15px;font-weight:700;margin-bottom:2px}
.dp-sub{font-size:12px;color:var(--t3)}
.drawer-sect{font-size:11px;font-weight:700;color:var(--t3);letter-spacing:.06em;padding:10px 20px 4px}
.drawer-item{display:flex;align-items:center;gap:12px;padding:13px 20px;font-size:14.5px;font-weight:500;width:100%;text-align:left}
.drawer-item:active{background:var(--s)}
.drawer-cnt{margin-left:auto;font-size:12px;font-weight:700;background:var(--pl);color:var(--pd);padding:2px 8px;border-radius:999px}
.drawer-foot{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--t3);padding:16px 20px 0;margin-top:auto;border-top:1px solid var(--b)}
.drawer-foot b{color:var(--p)}

/* QUICK ADD */
.sheet-layer{position:absolute;inset:0;z-index:300;pointer-events:none}
.sheet-layer.open{pointer-events:auto}
.sheet-scrim{position:absolute;inset:0;background:rgba(0,0,0,.4);opacity:0;transition:opacity .28s}
.sheet-layer.open .sheet-scrim{opacity:1}
.sheet-panel{position:absolute;bottom:0;left:0;right:0;background:#fff;border-radius:28px 28px 0 0;padding:10px 20px 32px;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,.32,1)}
.sheet-layer.open .sheet-panel{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--b);margin:0 auto 18px}
.qa-greet{font-size:13px;color:var(--t3);margin-bottom:2px}

.qa-label{font-size:13px;font-weight:700}

/* SUCCESS SHEET */
.success-layer{position:absolute;inset:0;z-index:400;display:flex;flex-direction:column}

.success-check{width:66px;height:66px;border-radius:50%;background:linear-gradient(135deg,#FFC766,#F0A330);display:flex;align-items:center;justify-content:center;margin:6px auto 16px;box-shadow:0 12px 30px rgba(240,163,48,.42)}

.smemo-img{width:100%;height:150px;position:relative;overflow:hidden;background:linear-gradient(135deg,#2a3340,#44515f)}

.toggle{margin-left:auto;width:44px;height:26px;border-radius:999px;background:var(--b);position:relative;transition:background .2s}

/* CUSTOMIZE */
.cz-scroll{flex:1;overflow-y:auto;padding:12px 18px 28px}

<body>
<div id="app"></div>

<script>
// ============ SVG ICONS ============
const ICONS = {
  bookmark:'M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z',
  menu:'M4 7h16M4 13h16M4 19h16',
  camera:'M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z',
  plus:'M12 5v14M5 12h14',
  fileText:'M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8zM14 2v6h6M16 13H8M16 17H8',
  chevronLeft:'M15 18l-6-6 6-6',
  chevronRight:'M9 18l6-6-6-6',
  search:'M11 19a8 8 0 1 0 0-16 8 8 0 0 0 0 16zM21 21l-4.3-4.3',
  mapPin:'M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z',
  clock:'M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20zM12 6v6l4 2',
  edit:'M12 20h9M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z',
  share:'M18 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6zM6 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6zM18 22a3 3 0 1 0 0-6 3 3 0 0 0 0 6zM8.6 13.5l6.8 4M15.4 6.5l-6.8 4',
  mic:'M12 15a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zM19 10v2a7 7 0 0 1-14 0v-2M12 19v4',
  sparkles:'M12 3l1.9 5.1L19 10l-5.1 1.9L12 17l-1.9-5.1L5 10l5.1-1.9z',
  check:'M20 6L9 17l-5-5',
  trash:'M3 6h18M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6M10 11v6M14 11v6M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2',
  settings:'M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z',
  image:'M19 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2zM21 15l-5-5L5 21',
  x:'M18 6L6 18M6 6l12 12',
  link:'M10 13a5 5 0 0 0 7.5.5l3-3a5 5 0 0 0-7-7l-1.7 1.7',
  rotateCcw:'M3 2v6h6M3.5 8a9 9 0 1 0 2.5-3.5L3 8',
  scan:'M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2M3 12h18',
  clockRotate:'M12 22a10 10 0 1 0-9.95-11M12 7v5l3 2M2 11l2.5-2.5L7 11',
  chevronDown:'M6 9l6 6 6-6',
  send:'M22 2L11 13M22 2l-7 20-4-9-9-4z',
  help:'M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20zM9.1 9a3 3 0 0 1 5.8 1c0 2-3 3-3 3M12 17h.01',
  calendar:'M19 4H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2zM16 2v4M8 2v4M3 10h18',
  download:'M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3',
};
function icon(name, size=22, color='currentColor', stroke=2) {
  const d = ICONS[name]||'';
  const paths = d.split('M').filter(Boolean).map(p=>'M'+p);
  const svgPaths = paths.map(p=>`<path d="${p}" fill="none" stroke="${color}" stroke-width="${stroke}" stroke-linecap="round" stroke-linejoin="round"/>`).join('');
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24">${svgPaths}</svg>`;
}
function logoSVG(size=22) {
  return `<svg width="${size}" height="${Math.round(size*.62)}" viewBox="0 0 40 24"><circle cx="8" cy="8" r="4.4" fill="var(--p)"/><circle cx="32" cy="8" r="4.4" fill="var(--a)"/><path d="M 5 14 Q 20 23 35 14" fill="none" stroke="var(--p)" stroke-width="3.2" stroke-linecap="round"/></svg>`;
}
const TYPE_ICON = {photo:'image',text:'fileText',link:'link',voice:'mic',shared:'share'};

// ============ DATA ============
const PHOTOS = {
  cafeLight:'https://images.unsplash.com/photo-1554118811-1e0d58224f24?w=800&q=80&auto=format&fit=crop',
  cafeMenu:'https://images.unsplash.com/photo-1559925393-8be0ec4767c8?w=800&q=80&auto=format&fit=crop',
  exhibit:'https://images.unsplash.com/photo-1531913764164-f85c52e6e654?w=800&q=80&auto=format&fit=crop',
};
const SEED = [
  {id:'m1',type:'photo',title:'카페 인테리어 조명',body:'강남 카페 인테리어 조명이 진짜 예뻤다. 따뜻한 색온도 + 간접조명 조합.',image:PHOTOS.cafeLight,ocr:'AROUND CORNER · OPEN 11:00–22:00',place:'성수동',timeLabel:'3일 전 · 오후 3:24',sortTime:3,source:'카메라',favorite:true,importance:96,deleted:false},
  {id:'m2',type:'photo',title:'카페 메뉴판 사진',body:'흑임자 라떼 / 얼그레이 크림. 다음에 꼭 마셔보기.',image:PHOTOS.cafeMenu,ocr:'SIGNATURE\n흑임자 라떼  6,500\n얼그레이 크림  6,000',place:'성수동',timeLabel:'3일 전',sortTime:3,source:'카메라',favorite:false,importance:71,deleted:false},
  {id:'m3',type:'link',title:'발표 자료 레퍼런스',body:'주간 발표 덱 만들 때 참고할 레이아웃.',image:null,place:'회사',timeLabel:'1주 전',sortTime:7,source:'카톡 공유',favorite:true,importance:88,deleted:false},
  {id:'m4',type:'text',title:'생일 선물 아이디어',body:'엄마 생신 선물 — 따뜻한 니트 카디건, 캐시미어 머플러. 색은 카멜/오트밀.',image:null,place:'집',timeLabel:'2주 전',sortTime:14,source:'직접 입력',favorite:false,importance:64,deleted:false},
  {id:'m5',type:'photo',title:'전시회 작품 사진',body:'DDP 미디어아트 전시. 빛으로 그린 파동.',image:PHOTOS.exhibit,ocr:'WAVE OF LIGHT\n2026 Media Art Exhibition · DDP',place:'DDP',timeLabel:'3주 전',sortTime:21,source:'카메라',favorite:false,importance:52,deleted:false},
  {id:'m6',type:'voice',title:'발표 자료 공유 리마인드',body:'',transcript:'내일 회의 끝나고 김대리한테 발표 자료 공유하기. 슬라이드 12번 수치 한 번 더 확인하고.',duration:'0:08',image:null,place:'회사',timeLabel:'오늘 · 오전 9:41',sortTime:0,source:'음성',favorite:false,importance:80,deleted:false},
];
let memos = JSON.parse(JSON.stringify(SEED));
let nextId = 100;

function activeMemos(){return memos.filter(m=>!m.deleted)}
function getMemo(id){return memos.find(m=>m.id===id)}
function addMemo(data){const id='u'+(nextId++);memos.unshift({id,deleted:false,...data});return id}
function updateMemo(id,patch){const m=getMemo(id);if(m)Object.assign(m,patch);render()}
function deleteMemo(id){updateMemo(id,{deleted:true})}
function restoreMemo(id){updateMemo(id,{deleted:false})}
function purgeMemo(id){memos=memos.filter(m=>m.id!==id);render()}
function recentMemos(n){return activeMemos().slice().sort((a,b)=>(a.sortTime||0)-(b.sortTime||0)).slice(0,n)}
function counts(){const a=activeMemos();return{active:a.length,fav:a.filter(m=>m.favorite).length,trash:memos.filter(m=>m.deleted).length}}

// ============ ROUTER ============
let stack=[{screen:'home',params:{}}];
let dir='none';

function navigate(screen,params={}){dir='fwd';stack.push({screen,params});render()}
function goBack(){if(stack.length>1){dir='back';stack.pop();render()}}
function goHome(){dir='back';stack=[{screen:'home',params:{}}];render()}
function curScreen(){return stack[stack.length-1]}
function param(k){return curScreen().params[k]}

// ============ OVERLAYS ============
let drawerOpen=false,quickAddOpen=false,successData=null,toastMsg=null,toastTimer=null;
function openDrawer(){drawerOpen=true;render()}
function closeDrawer(){drawerOpen=false;render()}
function openQuickAdd(){quickAddOpen=true;render()}
function closeQuickAdd(){quickAddOpen=false;render()}
function showSuccess(data){successData=data;render()}
function closeSuccess(){successData=null;render()}
function showToast(msg){
  toastMsg=msg;
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{toastMsg=null;render()},1900);
  render();
}

// ============ RENDER ============
function render(){
  const app=document.getElementById('app');
  app.innerHTML=buildApp();
  bindEvents();
}

function statusBar(dark=false){
  const col=dark?'#fff':'var(--t1)';
  return `<div class="sb"><span class="sb-time" style="color:${col}">9:41</span>
  <span class="sb-icons">${icon('search',16,col,1.5)}${icon('mic',16,col,1.5)}</span></div>`;
}

function thumbHTML(m,size=40,radius=12){
  if(m&&m.image) return `<div class="memo-thumb" style="border-radius:${radius}px"><img src="${m.image}" referrerpolicy="no-referrer" onerror="this.style.display='none'"></div>`;
  return `<div class="memo-thumb" style="border-radius:${radius}px">${icon(TYPE_ICON[m&&m.type]||'fileText',18,'var(--p)',2)}</div>`;
}

function chipHTML(ico,label,tone='p',spark=false){
  return `<span class="chip chip-${tone}">${spark?`<span style="margin-right:2px">${icon('sparkles',9,'var(--ad)',0)}</span>`:''}`+
    `${ico?icon(ico,11,'currentColor',2.4):''}${label}</span>`;
}

// ============ SCREENS ============
function buildApp(){
  const cur=curScreen();
  let html='';
  if(cur.screen==='home') html=buildHome();
  else if(cur.screen==='write') html=buildWrite();
  else if(cur.screen==='voice') html=buildVoice();
  else if(cur.screen==='camera') html=buildCamera();
  else if(cur.screen==='recall') html=buildRecall();
  else if(cur.screen==='detail') html=buildDetail();
  else if(cur.screen==='mymemos') html=buildMyMemos();
  else if(cur.screen==='favorites') html=buildFavorites();
  else if(cur.screen==='trash') html=buildTrash();
  else if(cur.screen==='share') html=buildShare();
  else if(cur.screen==='customize') html=buildCustomize();
  else html=buildHome();

  return html + buildDrawer() + buildQuickAdd() + buildSuccess() + buildToast();
}

function buildHome(){
  const recent=recentMemos(2);
  return `<div class="screen board-bg active" id="screen-home">
  ${statusBar()}
  <div class="topbar">
    <div class="tb-l"><span class="logo-tiny">${logoSVG(22)} momo<b>trace</b></span></div>
    <div class="tb-r">
      <button class="ibtn" onclick="navigate('recall')">${icon('search',20)}</button>
      <button class="ibtn" onclick="navigate('favorites')">${icon('bookmark',20)}</button>
      <button class="ibtn" onclick="openDrawer()">${icon('menu',20)}</button>
    </div>
  </div>
  <div class="board-area" onclick="navigate('write')">
    <div class="board-ph">오늘, 무엇을<br>기억할까요?<span class="board-cursor"></span></div>

      <div class="recent-strip">

          `<span class="rpill-name">${m.title}</span></div>`).join('')}
      </div>
    </div>
  </div>
  <div class="action-bar">
    <button class="abtn" onclick="navigate('mymemos')">${icon('fileText',20,'currentColor',1.9)}</button>
    <button class="abtn main" onclick="navigate('camera')">${icon('camera',25,'#fff',1.9)}</button>
    <button class="abtn add" onclick="openQuickAdd()">${icon('plus',21,'var(--p)',2.5)}</button>
  </div>
</div>`;
}

function buildWrite(){
  return `<div class="screen board-bg active" id="screen-write">
  ${statusBar()}
  <div class="topbar">
    <div class="tb-l"><button class="ibtn" onclick="goBack()">${icon('chevronLeft',20)}</button></div>
    <div class="tb-r"><button class="txt-btn" id="write-done-btn" onclick="writeSubmit()">완료</button></div>

    <div class="kb-row">${'ㅁㄴㅇㄹㅎㅗㅓㅏㅣ'.split('').map(k=>`<div class="kk">${k}</div>`).join('')}</div>
    <div class="kb-row"><div class="kk fn">⇧</div>${'ㅋㅌㅊㅍㅠㅜㅡ'.split('').map(k=>`<div class="kk">${k}</div>`).join('')}<div class="kk fn">⌫</div></div>
    <div class="kb-row"><div class="kk fn wide">123</div><div class="kk fn">🌐</div><div class="kk space">space</div><div class="kk fn wide">↵</div></div>
  </div>
</div>`;

function buildRecall(){
  const q=curScreen().params.q||'';
  const searching=curScreen().params.searching||false;
  const pool=activeMemos();
  function score(m){
    if(!q.trim()) return 0;
    const hay=(m.title+' '+(m.body||'')+' '+(m.place||'')+' '+(m.ocr||'')+' '+(m.transcript||'')).toLowerCase();
    const words=q.toLowerCase().split(/\s+/).filter(Boolean);
    let s=0;
    words.forEach(w=>{if(hay.includes(w))s+=30;if((m.place||'').toLowerCase().includes(w))s+=25;});
    return Math.min(98,s+(m.importance?Math.round(m.importance/6):0));
  }
  const results=q.trim()?pool.map(m=>({m,s:score(m)})).filter(r=>r.s>18).sort((a,b)=>b.s-a.s).slice(0,4):[];
  const suggestions=['성수동 카페','발표 자료','엄마 생신 선물','DDP 전시'];

  return `<div class="screen surface active" id="screen-recall">
  ${statusBar()}
  <div class="topbar">
    <div class="tb-l"><button class="ibtn" onclick="goBack()">${icon('chevronLeft',20)}</button></div>
    <div class="tb-title">기억 찾기</div>
    <div class="tb-r"></div>
  </div>
  <div class="recall-body">
    <div class="recall-search${q?' filled':''}">
      ${icon('search',17,'var(--p)',2)}
      <input class="recall-input" id="recall-input" value="${q}" placeholder="흐릿한 단서로 찾아보세요"
        oninput="recallInput(this.value)" onkeydown="if(event.key==='Enter')recallGo()">
      ${q?`<button class="recall-clear" onclick="recallClear()">${icon('x',15,'var(--t3)')}</button>`:''}
    </div>
    ${!q?`
    <div>
      <div class="suggest-label" style="margin-bottom:12px">이렇게 찾아보세요</div>
      <div class="suggest-chips">${suggestions.map(s=>`<button class="suggest-chip" onclick="recallSuggest('${s}')">${icon('search',12,'var(--t3)',2)}${s}</button>`).join('')}</div>
    </div>
    <div class="recall-tip">${icon('sparkles',12,'var(--ad)',2)} 정확한 제목이 아니어도, 장소·시간·느낌으로 찾아요</div>`:`
    ${searching?`<div class="recall-status">${icon('sparkles',12,'var(--p)',2.4)}<span>위치·시간 단서로 찾는 중…</span><span class="recall-timer" id="rtimer">0.0s</span></div>`
      :`<button class="recall-go" onclick="recallGo()">${icon('search',15,'#fff',2.2)} "${q}" 찾기</button>`}
    <div class="recall-results">
      ${results.length===0?`<div class="recall-empty">아직 일치하는 기억이 없어요.</div>`
        :results.map((r,i)=>`<div class="recall-card${i===0&&searching?' match':''}" onclick="recallOpen('${r.m.id}')">
        <div class="recall-thumb">${r.m.image?`<img src="${r.m.image}" referrerpolicy="no-referrer">`:icon(TYPE_ICON[r.m.type]||'fileText',17,'var(--p)',2)}</div>
        <div class="recall-info"><div class="recall-nm">${r.m.title}</div><div class="recall-ctx">${r.m.place?r.m.place+' · ':''}${r.m.timeLabel}</div></div>
        ${searching?`<span class="match-badge${i===0?' top':''}">${r.s}%</span>`:icon('chevronRight',16,'var(--t3)')}
      </div>`).join('')}
    </div>`}
  </div>
</div>`;
}

    <div style="width:36px;height:4px;border-radius:2px;background:var(--b);margin:0 auto 16px"></div>
    <div class="success-check${recall?' recall':''}">${icon('check',30,'#fff',3)}</div>
    <div class="success-title">${successData.title}</div>
    <div class="success-sub">${recall?'흐릿한 단서로도 단번에. 재탐색 완료!':'위치·시간 단서가 함께 저장됐어요'}</div>
    ${m?`<div class="success-memo" onclick="closeSuccess();navigate('detail',{id:'${m.id}'})">
      ${m.image?`<div class="smemo-img"><img src="${m.image}" referrerpolicy="no-referrer"></div>`
        :`<div class="smemo-band ${m.type==='voice'?'voice':''}">${icon(TYPE_ICON[m.type]||'fileText',26,'var(--p)',1.8)}</div>`}
      <div class="smemo-info">
        <div class="smemo-nm">${m.title}</div>
        <div class="smemo-ctx">${icon('mapPin',11,'var(--t2)',2.2)}${m.place?m.place+' · ':''}${m.timeLabel}</div>
      </div>
    </div>`:''}
    <div class="success-btns">
      <button class="sbtn ghost" onclick="closeSuccess();goHome()">${recall?'닫기':'보드로'}</button>
      <button class="sbtn" onclick="closeSuccess();navigate('detail',{id:'${successData.id}'})">${recall?'메모 열기':'열어보기'}</button>
    </div>
  </div>
</div>`;
}

function buildToast(){
  if(!toastMsg) return '';
  return `<div class="toast">${icon('check',14,'#fff',2.6)} ${toastMsg}</div>`;
}

// ============ EVENT HANDLERS ============
function bindEvents(){}

let voiceTimer=null,voiceSecs=0,voiceShown=0;
const voiceFull='내일 회의 끝나고 김대리한테 발표 자료 공유하기. 슬라이드 12번 수치 한 번 더 확인하고.';

function writeInput(ta){
  const len=ta.value.trim().length;
  const chips=document.getElementById('ctx-chips');
  const btn=document.getElementById('write-done-btn');
  if(btn) btn.className='txt-btn'+(len?' on':'');
  if(!chips) return;
  const c=[];
  if(len>0) c.push({ico:'clock',label:'오후 3:24'});
  if(len>6) c.push({ico:'mapPin',label:'성수동'});
  if(len>0) c.push({ico:'edit',label:'직접 입력'});
  chips.innerHTML=c.map(ch=>chipHTML(ch.ico,ch.label,'p',true)).join('')+
    (c.length?'<div class="chip-note">✦ 칩은 작성 중 자동으로 붙어요</div>':'');
}

function writeSubmit(){
  const ta=document.getElementById('write-area');
  if(!ta||!ta.value.trim()){goBack();return;}
  const text=ta.value.trim();
  const title=text.split('\n')[0].slice(0,20)+(text.length>20?'…':'');
  const len=text.length;
  const id=addMemo({type:'text',title,body:text,place:len>6?'성수동':'',timeLabel:'방금 · 오후 3:24',sortTime:0,source:'직접 입력',favorite:false,importance:60,image:null});
  showSuccess({kind:'save',title:'메모지에 담았어요',id});
}

function startVoice(){
  voiceSecs=0;voiceShown=0;
  clearInterval(voiceTimer);
  voiceTimer=setInterval(()=>{
    voiceSecs++;
    const mm=Math.floor(voiceSecs/60),ss=String(voiceSecs%60).padStart(2,'0');
    const el=document.getElementById('voice-time');
    if(el) el.textContent=`${mm}:${ss}`;
    if(voiceShown<voiceFull.length){
      voiceShown=Math.min(voiceFull.length,voiceShown+2);
      const tel=document.getElementById('vtrans');
      if(tel) tel.textContent=voiceFull.slice(0,voiceShown);
    }
  },100);
}

function voiceStop(){
  clearInterval(voiceTimer);
  const mm=Math.floor(voiceSecs/60),ss=String(voiceSecs%60).padStart(2,'0');
  const dur=voiceSecs<3?'0:03':`${mm}:${ss}`;
  const id=addMemo({type:'voice',title:'음성 메모',body:'',transcript:voiceFull,duration:dur,place:'회사',timeLabel:'방금 · 오전 9:41',sortTime:0,source:'음성',favorite:false,importance:70,image:null});
  showSuccess({kind:'save',title:'음성을 텍스트로 담았어요',id});
}

let camPhase='viewfinder';
function camShutter(){
  camPhase='scanning';
  const frame=document.getElementById('cam-frame');
  const ctrl=document.getElementById('cam-ctrl');
  const guide=document.getElementById('cam-guide');
  if(guide) guide.remove();
  if(frame){
    const corners=frame.querySelectorAll('.cam-corner');
    corners.forEach(c=>c.remove());
    frame.insertAdjacentHTML('beforeend','<div class="scan-line"></div><div class="scan-tag">텍스트 인식 중…</div>');
  }
  if(ctrl) ctrl.innerHTML='<div class="cam-proc">잠시만요…</div>';
  setTimeout(()=>{
    camPhase='recognized';
    if(frame){
      const sl=frame.querySelector('.scan-line');
      const st=frame.querySelector('.scan-tag');
      if(sl) sl.remove();
      if(st) st.remove();
      frame.insertAdjacentHTML('beforeend',
        '<div class="ocr-box" style="top:26%;left:18%;width:52%"><span>SIGNATURE</span></div>'+
        '<div class="ocr-box" style="top:44%;left:18%;width:64%"><span>흑임자 라떼  6,500</span></div>'+
        '<div class="ocr-box" style="top:58%;left:18%;width:62%"><span>얼그레이 크림  6,000</span></div>');
    }
    const chips=document.getElementById('cam-chips');
    if(chips) chips.innerHTML=`<div style="display:flex;gap:8px">${chipHTML('mapPin','성수동','p',true)}${chipHTML('scan','텍스트 3줄 인식','a',true)}</div>`;
    if(ctrl) ctrl.innerHTML=`<button class="cam-save" onclick="camSave()">${icon('check',18,'#fff',2.4)} 이대로 저장</button>`;
  },1800);
}

function camSave(){
  const id=addMemo({type:'photo',title:'카페 메뉴판 사진',body:'SIGNATURE — 흑임자 라떼 / 얼그레이 크림.',image:PHOTOS.cafeMenu,ocr:'SIGNATURE\n흑임자 라떼  6,500\n얼그레이 크림  6,000',place:'성수동',timeLabel:'방금 · 오후 3:25',sortTime:0,source:'카메라',favorite:false,importance:68,deleted:false});
  showSuccess({kind:'save',title:'사진과 글자를 함께 담았어요',id});
}

function recallInput(v){
  stack[stack.length-1].params.q=v;
  stack[stack.length-1].params.searching=false;
  render();
  setTimeout(()=>{const el=document.getElementById('recall-input');if(el){el.focus();el.setSelectionRange(v.length,v.length);}},10);
}

function recallClear(){
  stack[stack.length-1].params.q='';
  stack[stack.length-1].params.searching=false;
  render();
  setTimeout(()=>{const el=document.getElementById('recall-input');if(el)el.focus();},10);
}

function recallSuggest(s){
  stack[stack.length-1].params.q=s;
  recallGo();
}

let recallTimer=null,recallElapsed=0;
function recallGo(){
  const q=curScreen().params.q||'';
  if(!q.trim()) return;
  stack[stack.length-1].params.searching=true;
  recallElapsed=0;
  render();
  clearInterval(recallTimer);
  recallTimer=setInterval(()=>{
    recallElapsed+=0.1;
    const el=document.getElementById('rtimer');
    if(el) el.textContent=recallElapsed.toFixed(1)+'s';
  },100);
}

function recallOpen(id){
  clearInterval(recallTimer);
  const took=Math.max(1.4,Math.min(2.8,recallElapsed||2.1));
  showSuccess({kind:'recall',title:`${took.toFixed(1)}초 만에 찾았어요!`,id});
}

function toggleFav(id){
  const m=getMemo(id);
  if(!m) return;
  updateMemo(id,{favorite:!m.favorite});
  showToast(m.favorite?'즐겨찾기에서 뺐어요':'즐겨찾기에 담았어요');
}

function delMemo(id){
  deleteMemo(id);
  showToast('휴지통으로 옮겼어요');
  goBack();
}

function setCzTheme(p,a){
  document.documentElement.style.setProperty('--p',p);
  document.documentElement.style.setProperty('--pd',p);
  document.documentElement.style.setProperty('--a',a);
  showToast('테마를 변경했어요');
  render();
}

// ============ INIT ============
render();
// voice screen 자동 시작
const _origNavigate=navigate;
window.navigate=function(screen,params={}){
  _origNavigate(screen,params);
  if(screen==='voice') setTimeout(startVoice,100);
};
</script>
